  summary:
    defaults:
      run:
        working-directory: ./pse-backend-demo/
    name: Workflow Summary
    needs: [setup, test, build]
    runs-on: ubuntu-latest
    if: always() # Run even if previous jobs fail
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Generate CI Summary
        env:
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_ID: ${{ github.run_id }}
          DOCKER_RESULT: ${{ needs.docker.result }}
        run: |
          echo "# 📋 CI Workflow Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Build info
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## 🔨 Build Information" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Repository** | $REPOSITORY |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Branch/Tag** | $REF_NAME |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | [$SHA](https://github.com/$REPOSITORY/commit/$SHA) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Triggered by** | $EVENT_NAME |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Workflow Run** | [View Details](https://github.com/$REPOSITORY/actions/runs/$RUN_ID) |" >> "$GITHUB_STEP_SUMMARY"

          # Docker image info (when applicable)
          if [[ "$DOCKER_RESULT" == "success" && "$EVENT_NAME" != "pull_request" ]]; then
            REPO_NAME="${REPOSITORY#*/}"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "## 🐳 Docker Image" >> "$GITHUB_STEP_SUMMARY"
            echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
            echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
            echo "| **Repository** | ghcr.io/$REPOSITORY |" >> "$GITHUB_STEP_SUMMARY"
            echo "| **Latest Tag** | ghcr.io/$REPOSITORY:$SHA |" >> "$GITHUB_STEP_SUMMARY"
            echo "| **Package URL** | [View on GitHub](https://github.com/$REPOSITORY/pkgs/container/$REPO_NAME) |" >> "$GITHUB_STEP_SUMMARY"
          fi
