name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: lts/*
    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1.8.0
      with:
        version: stable
    - name: Install dependencies
      run: npm install -g pnpm && pnpm install
    - name: Resolve Playwright version for cache key
      id: playwright-version
      run: echo "version=$(pnpm exec playwright --version | tail -1 | awk '{print $2}')" >> $GITHUB_OUTPUT
    # Lockfile hash invalidates cache when resolved @playwright/test changes even if semver range stays the same.
    - name: Cache Playwright browsers
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}-${{ steps.playwright-version.outputs.version }}
    # Always install: ensures browser build matches installed @playwright/test (skipped installs on cache-hit miss revisions).
    - name: Install Playwright Browsers
      run: pnpm exec playwright install --with-deps chromium
    - name: Run Playwright tests
      run: pnpm exec playwright test
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
